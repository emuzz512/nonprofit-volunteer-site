<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background with rounded corners -->
  <rect width="100" height="100" rx="18" fill="#FF6B6B"/>
  
  <!-- Two hands reaching together (simplified) -->
  <!-- Left hand -->
  <path d="M 25 55 L 25 45 Q 25 40 30 40 L 35 40 Q 40 40 40 45 L 40 55 Q 40 58 37 58 L 28 58 Q 25 58 25 55 Z" fill="white"/>
  
  <!-- Right hand -->
  <path d="M 75 55 L 75 45 Q 75 40 70 40 L 65 40 Q 60 40 60 45 L 60 55 Q 60 58 63 58 L 72 58 Q 75 58 75 55 Z" fill="white"/>
  
  <!-- Connection/heart in middle -->
  <circle cx="50" cy="50" r="8" fill="white"/>
  
  <!-- Connecting lines -->
  <rect x="38" y="47" width="10" height="6" fill="white"/>
  <rect x="52" y="47" width="10" height="6" fill="white"/>
</svg>
